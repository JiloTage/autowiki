name: Auto-Wiki Skill Runner

on:
  workflow_dispatch:
    inputs:
      skill:
        description: "Skill to run"
        required: true
        type: choice
        options:
          - "/auto-wiki"
          - "/auto-wiki-expand"
          - "/auto-wiki-sync"
          - "/auto-wiki-react"
          - "/auto-wiki-portal"
          - "/auto-wiki-feedback"
          - "/auto-wiki-request"
      args:
        description: "Arguments (e.g. topic name, --wiki id)"
        required: false
        type: string
        default: ""
      provider:
        description: "Execution provider"
        required: false
        type: string
        default: "codex"
      model:
        description: "Execution model"
        required: false
        type: string
        default: "gpt-5.4"
      effort:
        description: "Reasoning effort"
        required: false
        type: string
        default: "medium"
      max_turns:
        description: "Max turns"
        required: false
        type: number
        default: 100

jobs:
  run-skill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Prepare execution
        id: prepare
        run: >
          uv run python -m tools.ci_runner prepare
          --provider "${{ inputs.provider }}"
          --model "${{ inputs.model }}"
          --effort "${{ inputs.effort }}"
          --skill "${{ inputs.skill }}"
          --args "${{ inputs.args }}"

      - name: Fail unsupported execution provider
        if: steps.prepare.outputs.provider_supported != 'true'
        run: |
          echo "::error::${{ steps.prepare.outputs.provider_error }}"
          exit 1

      - name: Require Codex API key
        if: steps.prepare.outputs.runner == 'codex-action' && secrets.OPENAI_API_KEY == ''
        run: |
          echo "::error::OPENAI_API_KEY is required when provider=codex."
          exit 1

      - name: Require Claude OAuth token
        if: steps.prepare.outputs.runner == 'claude-code-action' && secrets.CLAUDE_CODE_OAUTH_TOKEN == ''
        run: |
          echo "::error::CLAUDE_CODE_OAUTH_TOKEN is required when provider=claude."
          exit 1

      - uses: anthropics/claude-code-action@v1
        if: steps.prepare.outputs.runner == 'claude-code-action'
        with:
          model: ${{ steps.prepare.outputs.model }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.prepare.outputs.main_prompt }}
          claude_args: "--max-turns ${{ inputs.max_turns }}"
          display_report: "true"
          settings: ${{ steps.prepare.outputs.main_settings_json }}

      - name: Run Codex
        id: run_codex
        if: steps.prepare.outputs.runner == 'codex-action'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: ${{ steps.prepare.outputs.main_prompt }}
          model: ${{ steps.prepare.outputs.model }}
          effort: ${{ steps.prepare.outputs.effort }}
          sandbox: ${{ steps.prepare.outputs.sandbox }}
          safety-strategy: ${{ steps.prepare.outputs.safety_strategy }}

      # Auto-react: after expand, check if cross-wiki reaction should fire
      - name: Check auto-react conditions
        if: inputs.skill == '/auto-wiki-expand'
        id: check-react
        run: |
          result=$(uv run awiki reaction should-react --threshold 5)
          echo "$result"
          should=$(echo "$result" | python3 -c "import sys,json; print(json.load(sys.stdin)['should_react'])")
          echo "should_react=$should" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        if: inputs.skill == '/auto-wiki-expand' && steps.check-react.outputs.should_react == 'True' && steps.prepare.outputs.runner == 'claude-code-action'
        with:
          model: ${{ steps.prepare.outputs.model }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.prepare.outputs.react_prompt }}
          claude_args: "--max-turns ${{ inputs.max_turns }}"
          display_report: "true"
          settings: ${{ steps.prepare.outputs.react_settings_json }}

      - name: Run Codex auto-react
        if: inputs.skill == '/auto-wiki-expand' && steps.check-react.outputs.should_react == 'True' && steps.prepare.outputs.runner == 'codex-action'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: ${{ steps.prepare.outputs.react_prompt }}
          model: ${{ steps.prepare.outputs.model }}
          effort: ${{ steps.prepare.outputs.effort }}
          sandbox: ${{ steps.prepare.outputs.sandbox }}
          safety-strategy: ${{ steps.prepare.outputs.safety_strategy }}

      # Final step: rebuild portal page after any skill execution
      - name: Rebuild portal
        if: inputs.skill != '/auto-wiki-portal' && steps.prepare.outputs.runner == 'claude-code-action'
        uses: anthropics/claude-code-action@v1
        with:
          model: ${{ steps.prepare.outputs.model }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.prepare.outputs.portal_prompt }}
          claude_args: "--max-turns 30"
          display_report: "true"
          settings: ${{ steps.prepare.outputs.portal_settings_json }}

      - name: Rebuild portal with Codex
        if: inputs.skill != '/auto-wiki-portal' && steps.prepare.outputs.runner == 'codex-action'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: ${{ steps.prepare.outputs.portal_prompt }}
          model: ${{ steps.prepare.outputs.model }}
          effort: ${{ steps.prepare.outputs.effort }}
          sandbox: ${{ steps.prepare.outputs.sandbox }}
          safety-strategy: ${{ steps.prepare.outputs.safety_strategy }}

      - name: Commit and push workflow changes
        if: steps.prepare.outputs.commit_strategy == 'workflow'
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Run Auto-Wiki skill via ${{ steps.prepare.outputs.provider_label }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
